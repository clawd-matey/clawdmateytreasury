<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clawdmatey Treasury</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 2rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { 
            font-size: 2rem; 
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
        }
        .card-label { 
            color: var(--text-muted); 
            font-size: 0.75rem; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .card-value { 
            font-size: 1.5rem; 
            font-weight: 600;
        }
        .card-sub { 
            color: var(--text-muted); 
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .token-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }
        .token-row:last-child { border-bottom: none; }
        .token-name { font-weight: 500; }
        .token-balance { color: var(--text-muted); }
        .token-pct { 
            font-size: 0.75rem;
            color: var(--yellow);
        }
        .status { 
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.875rem;
        }
        .status.ok { background: rgba(63, 185, 80, 0.15); color: var(--green); }
        .status.warning { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }
        .dot { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            background: currentColor;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .links { margin-top: 2rem; }
        .links a {
            color: var(--accent);
            text-decoration: none;
            margin-right: 1.5rem;
        }
        .links a:hover { text-decoration: underline; }
        #loading { color: var(--text-muted); }
        #error { color: var(--red); display: none; }
        .last-update { 
            color: var(--text-muted); 
            font-size: 0.75rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏴‍☠️ Clawdmatey Treasury</h1>
        <p class="subtitle">
            <span class="status ok"><span class="dot"></span> Hourly claims active</span>
        </p>

        <div id="loading">Loading treasury data...</div>
        <div id="error"></div>

        <div id="content" style="display: none;">
            <div class="grid">
                <div class="card">
                    <div class="card-label">Total Value (est)</div>
                    <div class="card-value" id="total-value">—</div>
                </div>
                <div class="card">
                    <div class="card-label">YARR Supply %</div>
                    <div class="card-value" id="yarr-pct">—</div>
                    <div class="card-sub">Burn threshold: 5%</div>
                </div>
                <div class="card">
                    <div class="card-label">ETH Balance</div>
                    <div class="card-value" id="eth-balance">—</div>
                </div>
            </div>

            <div class="card">
                <div class="card-label">Portfolio Holdings</div>
                <div id="holdings"></div>
            </div>

            <p class="last-update">Last updated: <span id="update-time">—</span></p>
        </div>

        <div class="links">
            <a href="https://github.com/clawd-matey/clawdmateytreasury">GitHub</a>
            <a href="https://github.com/clawd-matey/clawdmateytreasury/blob/main/TRANSACTIONS.md">Transactions</a>
            <a href="https://basescan.org/address/0xdb784e1Dce8b11CC45b5228E9Ae48B03bDeFD1D9">Basescan</a>
            <a href="https://debank.com/profile/0xdb784e1Dce8b11CC45b5228E9Ae48B03bDeFD1D9">DeBank</a>
        </div>
    </div>

    <script>
        const TREASURY = '0xdb784e1Dce8b11CC45b5228E9Ae48B03bDeFD1D9';
        const RPC = 'https://base-rpc.publicnode.com';
        
        const TOKENS = {
            YARR:  { addr: '0x309792e8950405f803c0e3f2c9083bdff4466ba3', decimals: 18 },
            RED:   { addr: '0x2e662015a501f066e043d64d04f77ffe551a4b07', decimals: 18 },
            CLAWD: { addr: '0x9f86dB9fc6f7c9408e8Fda3Ff8ce4e78ac7a6b07', decimals: 18 },
            WBTC:  { addr: '0x0555E30da8f98308EdB960aa94C0Db47230d2B9c', decimals: 8 },
        };

        // DexScreener API for token prices (Base chain)
        const DEXSCREENER_BASE = 'https://api.dexscreener.com/latest/dex/tokens/';

        async function rpcCall(method, params) {
            const res = await fetch(RPC, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jsonrpc: '2.0', id: 1, method, params })
            });
            const json = await res.json();
            return json.result;
        }

        async function getBalance(token, wallet) {
            const data = '0x70a08231' + wallet.slice(2).padStart(64, '0');
            const hex = await rpcCall('eth_call', [{ to: token, data }, 'latest']);
            return BigInt(hex);
        }

        async function getTotalSupply(token) {
            const hex = await rpcCall('eth_call', [{ to: token, data: '0x18160ddd' }, 'latest']);
            return BigInt(hex);
        }

        async function getEthBalance(wallet) {
            const hex = await rpcCall('eth_getBalance', [wallet, 'latest']);
            return BigInt(hex);
        }

        async function getPrices() {
            const prices = { ETH: 0, WBTC: 0, YARR: 0, RED: 0, CLAWD: 0 };
            
            try {
                // ETH + BTC from CoinGecko
                const cgRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum,bitcoin&vs_currencies=usd');
                const cgData = await cgRes.json();
                prices.ETH = cgData.ethereum?.usd || 0;
                prices.WBTC = cgData.bitcoin?.usd || 0;
            } catch (e) { console.log('CoinGecko error:', e); }

            // Meme tokens from DexScreener
            for (const [symbol, info] of Object.entries(TOKENS)) {
                if (symbol === 'WBTC') continue; // Already have BTC price
                try {
                    const res = await fetch(DEXSCREENER_BASE + info.addr);
                    const data = await res.json();
                    const pair = data.pairs?.find(p => p.chainId === 'base');
                    if (pair?.priceUsd) {
                        prices[symbol] = parseFloat(pair.priceUsd);
                    }
                } catch (e) { console.log(`DexScreener error for ${symbol}:`, e); }
            }

            return prices;
        }

        function formatNum(n, decimals = 2) {
            if (n >= 1e9) return (n / 1e9).toFixed(decimals) + 'B';
            if (n >= 1e6) return (n / 1e6).toFixed(decimals) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(decimals) + 'K';
            return n.toFixed(decimals);
        }

        function formatUsd(n) {
            if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
            if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
            if (n >= 1) return '$' + n.toFixed(2);
            return '$' + n.toFixed(4);
        }

        async function loadData() {
            try {
                const holdings = [];
                let totalUsd = 0;

                // Get prices first
                const prices = await getPrices();

                // Get ETH balance
                const ethBal = await getEthBalance(TREASURY);
                const ethNum = Number(ethBal) / 1e18;
                const ethUsd = ethNum * prices.ETH;
                totalUsd += ethUsd;
                document.getElementById('eth-balance').textContent = ethNum.toFixed(4) + ' ETH';
                if (prices.ETH > 0) {
                    document.getElementById('eth-balance').textContent += ` (${formatUsd(ethUsd)})`;
                }

                // Get token balances
                for (const [symbol, info] of Object.entries(TOKENS)) {
                    const bal = await getBalance(info.addr, TREASURY);
                    const supply = await getTotalSupply(info.addr);
                    const balNum = Number(bal) / (10 ** info.decimals);
                    const pct = supply > 0 ? (Number(bal) / Number(supply) * 100) : 0;
                    const price = prices[symbol] || 0;
                    const usdValue = balNum * price;
                    totalUsd += usdValue;

                    holdings.push({ symbol, balance: balNum, pct, price, usdValue });

                    if (symbol === 'YARR') {
                        document.getElementById('yarr-pct').textContent = pct.toFixed(2) + '%';
                    }
                }

                // Render holdings with USD values
                const holdingsHtml = holdings.map(h => `
                    <div class="token-row">
                        <div>
                            <span class="token-name">${h.symbol}</span>
                            <span class="token-pct">${h.pct.toFixed(4)}% supply</span>
                        </div>
                        <div style="text-align: right;">
                            <span class="token-balance">${formatNum(h.balance)}</span>
                            ${h.usdValue > 0 ? `<div style="color: var(--green); font-size: 0.875rem;">${formatUsd(h.usdValue)}</div>` : ''}
                        </div>
                    </div>
                `).join('');
                document.getElementById('holdings').innerHTML = holdingsHtml;

                // Total USD value
                document.getElementById('total-value').textContent = formatUsd(totalUsd);

                document.getElementById('update-time').textContent = new Date().toLocaleString();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Error loading data: ' + err.message;
            }
        }

        loadData();
        setInterval(loadData, 60000); // Refresh every minute
    </script>
</body>
</html>
